<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AmazinGym x Crookies — Roda da Sorte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800;900&family=Rye&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF0000;
    --dark: #1A1A1A;
    --darker: #0D0D0D;
    --gray: #323232;
    --light-gray: #5A5A5A;
    --off-white: #EBEBEB;
    --crookie-brown: #8B5E3C;
    --crookie-tan: #C8956C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--darker);
    font-family: 'Montserrat', sans-serif;
    color: var(--off-white);
    touch-action: manipulation;
  }

  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity .4s, transform .4s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #2a0000 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, #1a0000 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ══════════════════════════════
     SCREEN 1 — ROLETA
  ══════════════════════════════ */
  #screen-wheel {
    z-index: 1;
    padding: 20px;
    gap: 0;
  }

  .brand-header {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 16px;
  }
  .brand-header .amazin-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; color: var(--off-white); letter-spacing: 2px;
    line-height: 1;
  }
  .brand-header .amazin-logo span { color: var(--red); }
  .brand-header .collab { font-size: .7rem; font-weight: 700; color: #FFFFFF; letter-spacing: 3px; text-transform: uppercase; }

  .crookies-font {
    font-family: 'Rye', serif;
    font-size: .85rem;
    color: #c8956c;
    letter-spacing: 2px;
    text-shadow: 1px 1px 0 #5c3a1e, 0 0 8px #8B5E3C66;
  }
  .crookies-badge {
    background: linear-gradient(135deg, #5c3a1e, #8B5E3C);
    border-radius: 50px; padding: 4px 14px;
    font-size: .65rem; font-weight: 800; letter-spacing: 2px;
    color: #f5d9a8; text-transform: uppercase;
    border: 1px solid #c8956c44;
  }

  .tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 4px; color: var(--off-white);
    text-align: center; margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* Wheel container */
  .wheel-container {
    position: relative;
    width: min(420px, 88vw);
    height: min(420px, 88vw);
    flex-shrink: 0;
  }

  #wheel-canvas {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 0 6px var(--gray), 0 0 0 10px var(--red), 0 0 60px #ff000066, 0 0 120px #ff000022;
  }

  /* Pointer */
  .wheel-pointer {
    position: absolute;
    top: 50%; right: -18px;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-right: 36px solid var(--red);
    filter: drop-shadow(0 0 8px #ff0000cc);
    z-index: 10;
  }

  /* Center button */
  .wheel-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #2a2a2a, #111);
    border: 4px solid var(--red);
    box-shadow: 0 0 20px #ff000088;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 20;
    transition: transform .15s, box-shadow .15s;
    -webkit-user-select: none; user-select: none;
  }
  .wheel-center:active { transform: translate(-50%,-50%) scale(.92); }
  .wheel-center.spinning { pointer-events: none; }
  .wheel-center-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 2px; color: var(--red);
    text-align: center; line-height: 1.1;
  }

  .spin-instruction {
    margin-top: 28px;
    font-size: .75rem; font-weight: 700; letter-spacing: 3px;
    color: var(--light-gray); text-transform: uppercase; text-align: center;
  }
  .spin-instruction span { color: var(--red); }

  /* ══════════════════════════════
     SCREEN 2 — PRÉMIO
  ══════════════════════════════ */
  #screen-prize {
    z-index: 2;
    padding: 32px 24px;
    text-align: center;
    gap: 0;
  }

  .prize-eyebrow {
    font-size: .7rem; font-weight: 800; letter-spacing: 4px;
    color: var(--red); text-transform: uppercase; margin-bottom: 8px;
  }

  .prize-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 3px; color: #EBEBEB;
    margin-bottom: 20px;
  }

  .prize-card {
    background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
    border: 2px solid var(--red);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 380px;
    box-shadow: 0 0 40px #ff000033, 0 20px 60px #00000088;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .prize-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #ff000011, transparent 60%);
    pointer-events: none;
  }

  .prize-icon { font-size: 3.5rem; margin-bottom: 12px; display: block; }

  .prize-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; letter-spacing: 3px; color: var(--off-white);
    line-height: 1.1; margin-bottom: 8px;
  }
  .prize-name.crookie { color: var(--crookie-tan); }

  .prize-brand {
    font-size: .65rem; font-weight: 800; letter-spacing: 3px;
    color: var(--light-gray); text-transform: uppercase;
  }
  .prize-brand.crookie { color: var(--crookie-brown); }

  .confetti-row {
    font-size: 1.4rem; margin-top: 8px; letter-spacing: 4px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .form-label {
    font-size: .7rem; font-weight: 700; letter-spacing: 3px;
    color: #EBEBEB; text-transform: uppercase;
    margin-bottom: 16px; display: block;
  }

  .form-fields { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }

  .form-fields input {
    background: #1e1e1e; border: 1.5px solid var(--gray);
    border-radius: 10px; padding: 14px 16px;
    font-family: 'Montserrat', sans-serif; font-size: .9rem; font-weight: 600;
    color: var(--off-white); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-fields input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px #ff000022;
  }
  .form-fields input::placeholder { color: var(--light-gray); font-weight: 400; }

  .btn-submit {
    margin-top: 6px;
    background: var(--red); border: none; border-radius: 10px;
    padding: 16px; width: 100%;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px;
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 24px #ff000066;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-submit:active { transform: scale(.97); }
  .btn-submit:disabled { background: var(--gray); box-shadow: none; cursor: not-allowed; }

  .status-msg {
    font-size: .75rem; font-weight: 600; text-align: center;
    margin-top: 8px; min-height: 20px; color: var(--light-gray);
  }
  .status-msg.error { color: #ff6666; }
  .status-msg.success { color: #66ff99; }

  /* ══════════════════════════════
     SCREEN 3 — OBRIGADO
  ══════════════════════════════ */
  #screen-thanks {
    z-index: 3;
    text-align: center;
    padding: 40px 24px;
    gap: 16px;
  }

  .thanks-icon { font-size: 5rem; animation: bounce .6s ease-in-out; }
  @keyframes bounce { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }

  .thanks-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem; letter-spacing: 4px; color: var(--red);
    line-height: 1;
  }

  .thanks-sub {
    font-size: .85rem; font-weight: 600; color: #EBEBEB;
    line-height: 1.6; max-width: 320px;
  }
  .thanks-sub strong { color: var(--off-white); }

  .thanks-prize-recap {
    background: #1e1e1e; border: 1.5px solid var(--gray);
    border-radius: 14px; padding: 16px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 2px; color: var(--off-white);
  }

  .btn-reset {
    background: transparent; border: 2px solid var(--gray);
    border-radius: 10px; padding: 14px 32px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px;
    color: var(--light-gray); cursor: pointer;
    transition: border-color .2s, color .2s;
    margin-top: 8px;
  }
  .btn-reset:active { border-color: var(--red); color: var(--red); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 100;
    border-radius: 50%; animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ── GLOW RING ── */
  @keyframes spin-glow {
    0%,100%{box-shadow:0 0 0 6px var(--gray),0 0 0 10px var(--red),0 0 60px #ff000066,0 0 120px #ff000022}
    50%{box-shadow:0 0 0 6px var(--gray),0 0 0 10px var(--red),0 0 80px #ff0000aa,0 0 160px #ff000044}
  }
  #wheel-canvas.spinning-anim { animation: spin-glow .5s ease-in-out infinite; }
</style>
</head>

<script>
// ══════════════════════════════
// CONFIG
// ══════════════════════════════

const SUPABASE_URL = "https://hiympgwjvrisqeaovwmv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpeW1wZ3dqdnJpc3FlYW92d212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzM4MTYsImV4cCI6MjA5NDcwOTgxNn0.Or3CuX8GM9SuRCvzyngMM41S90zyzkWLsynCm2wh6XA";
let leadsCount = 0;

const PRIZES = [
  // AmazinGym
  { name: "1 Dia de Treino Grátis",     brand: "AmazinGym",  icon: "💪", weight: 28, isCrookie: false, color: "#FF0000" },
  { name: "3 Dias de Treino Grátis",    brand: "AmazinGym",  icon: "🔥", weight: 22, isCrookie: false, color: "#CC0000" },
  { name: "Inscrição Grátis",           brand: "AmazinGym",  icon: "🏋️", weight: 18, isCrookie: false, color: "#FF2222" },
  { name: "Avaliação de Nutrição",      brand: "AmazinGym",  icon: "🥗", weight: 7,  isCrookie: false, color: "#AA0000" },
  { name: "Sessão de PT 30 min",        brand: "AmazinGym",  icon: "🤝", weight: 4,  isCrookie: false, color: "#DD0000" },
  { name: "Mensalidade Grátis",         brand: "AmazinGym",  icon: "📅", weight: 4,  isCrookie: false, color: "#990000" },
  { name: "T-Shirt AmazinGym",          brand: "AmazinGym",  icon: "👕", weight: 1,  isCrookie: false, color: "#BB0000" },
  { name: "Anuidade Grátis",            brand: "AmazinGym",  icon: "⭐", weight: 1,  isCrookie: false, color: "#FF4444" },
  // Crookies
  { name: "1 Topping Extra Grátis",     brand: "Crookies",   icon: "🍫", weight: 10, isCrookie: true,  color: "#8B5E3C" },
  { name: "1 Bebida Grátis",            brand: "Crookies",   icon: "🥤", weight: 4,  isCrookie: true,  color: "#A0724A" },
  { name: "1 Crookie Grátis",           brand: "Crookies",   icon: "🥐", weight: 2,  isCrookie: true,  color: "#C8956C" },
];

// Build weighted lookup
const WHEEL_SEGMENTS = [];
PRIZES.forEach(p => {
  for (let i = 0; i < p.weight; i++) WHEEL_SEGMENTS.push(p);
});

// ══════════════════════════════
// CANVAS WHEEL
// ══════════════════════════════
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const NUM = PRIZES.length;
const ARC = (2 * Math.PI) / NUM;
let currentAngle = 0;
let spinning = false;
let wonPrize = null;

function drawWheel(angle) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  PRIZES.forEach((p, i) => {
    const start = angle + i * ARC;
    const end = start + ARC;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = p.isCrookie
      ? (i % 2 === 0 ? '#5c3a1e' : '#8B5E3C')
      : (i % 2 === 0 ? '#1A1A1A' : '#242424');
    ctx.fill();
    ctx.strokeStyle = '#FF0000';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Accent arc
    ctx.beginPath();
    ctx.arc(cx, cy, r - 8, start + 0.04, end - 0.04);
    ctx.strokeStyle = p.isCrookie ? '#c8956c44' : '#ff000033';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'right';

    // Icon
    ctx.font = `${Math.min(28, r * 0.08)}px serif`;
    ctx.fillText(p.icon, r - 14, 6);

    // Label
    const fontSize = Math.min(14, r * 0.038);
    ctx.font = `700 ${fontSize}px Montserrat, sans-serif`;
    ctx.fillStyle = p.isCrookie ? '#f5d9a8' : '#EBEBEB';

    const words = p.name.split(' ');
    const maxW = r * 0.52;
    let line = '', lines = [];
    words.forEach(w => {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
      else line = test;
    });
    lines.push(line);

    const lh = fontSize + 2;
    const startY = -(lines.length - 1) * lh / 2;
    lines.forEach((l, li) => ctx.fillText(l, r - 44, startY + li * lh + 4));

    ctx.restore();
  });

  // Center disc
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 52);
  grad.addColorStop(0, '#2a2a2a');
  grad.addColorStop(1, '#111');
  ctx.beginPath();
  ctx.arc(cx, cy, 52, 0, 2 * Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#FF0000';
  ctx.lineWidth = 3;
  ctx.stroke();
}

drawWheel(0);

// ══════════════════════════════
// SPIN LOGIC
// ══════════════════════════════
function pickPrize() {
  return WHEEL_SEGMENTS[Math.floor(Math.random() * WHEEL_SEGMENTS.length)];
}

function prizeAngle(prize) {
  const idx = PRIZES.indexOf(prize);
  // Center of that slice should land at the pointer (pointing from right = 0 rad)
  // Pointer is at the right (3 o'clock) = 0 radians
  const sliceCenter = -(idx * ARC + ARC / 2);
  return sliceCenter;
}

function startSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').classList.add('spinning');
  canvas.classList.add('spinning-anim');

  wonPrize = pickPrize();
  const targetAngle = prizeAngle(wonPrize);
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const finalAngle = targetAngle + extraSpins;
  const duration = 4000 + Math.random() * 1000;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle % (2 * Math.PI);
      spinning = false;
      canvas.classList.remove('spinning-anim');
      setTimeout(showPrize, 400);
    }
  }
  requestAnimationFrame(animate);
}

// ══════════════════════════════
// SCREENS
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showPrize() {
  document.getElementById('prize-icon').textContent = wonPrize.icon;
  document.getElementById('prize-name').textContent = wonPrize.name;
  document.getElementById('prize-name').className = 'prize-name' + (wonPrize.isCrookie ? ' crookie' : '');
  document.getElementById('prize-brand').textContent = wonPrize.brand;
  document.getElementById('prize-brand').className = 'prize-brand' + (wonPrize.isCrookie ? ' crookie' : '');
  document.getElementById('status-msg').textContent = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-email').value = '';
  showScreen('screen-prize');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#FF0000','#EBEBEB','#C8956C','#FF4444','#FFF'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 6 + Math.random() * 8;
      el.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random()*100}vw;top:-10px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 30);
  }
}

// ══════════════════════════════
// FORM SUBMIT
// ══════════════════════════════
async function submitLead() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const btn   = document.getElementById('btn-submit');

  if (!name)  { setStatus('Por favor, insere o teu nome.', 'error'); return; }
  if (!phone) { setStatus('Por favor, insere o teu telemóvel.', 'error'); return; }
  if (!email || !email.includes('@')) { setStatus('Por favor, insere um e-mail válido.', 'error'); return; }

  btn.disabled = true;
  setStatus('A registar...', '');

  const timestamp = new Date().toLocaleString('pt-PT', { timeZone: 'Europe/Lisbon' });

  try {
    const res = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ timestamp, name, phone, email, prize: wonPrize.name, brand: wonPrize.brand })
    });
    if (!res.ok) throw new Error('Erro ' + res.status);
    leadsCount++;
    updateLeadCount();
    document.getElementById('thanks-recap').textContent = wonPrize.icon + '  ' + wonPrize.name;
    showScreen('screen-thanks');
  } catch(e) {
    setStatus('Erro de ligação. Tenta novamente.', 'error');
    btn.disabled = false;
  }
}

function setStatus(text, type) {
  const el = document.getElementById('status-msg');
  el.textContent = text;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}

function resetApp() {
  wonPrize = null;
  document.getElementById('spin-btn').classList.remove('spinning');
  drawWheel(currentAngle);
  showScreen('screen-wheel');
}

function updateLeadCount() {
  const el = document.getElementById('lead-count');
  if (el) el.textContent = leadsCount + ' lead' + (leadsCount !== 1 ? 's' : '') + ' registado' + (leadsCount !== 1 ? 's' : '');
}

  const url = "https://docs.google.com/spreadsheets/d/" + sheetId + "/export?format=csv&sheet=Folha1";

}
